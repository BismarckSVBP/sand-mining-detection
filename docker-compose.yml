version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Hot-reload: mount source so you can edit without rebuilding
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - PYTHONPATH=/app
      - PYTHONDONTWRITEBYTECODE=1
    command: >
      uvicorn backend.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
